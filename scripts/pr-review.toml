# PR Review Configuration — Mobile SuperApp Kit
# Generated by cypilot mobile-superapp kit — edit to match your project.
#
# Resolution order:
#   1. {cypilot_path}/config/pr-review.toml   (user-editable, this file)
#   2. {scripts}/pr-review.toml  (default)
#
# Paths support {cypilot_path} variable — resolved at runtime.

data_dir = ".prs"

# ── Prompt entries ────────────────────────────────────────────────
# Each [[prompts]] block maps a review type to a prompt file,
# checklist, and optional project-specific variables.
# The agent selects the best match based on PR content.

[[prompts]]
description = "Mobile Code Review"
prompt_file = "{scripts}/prompts/pr/mobile-code-review.md"
checklist   = "config/kits/mobile-superapp/codebase/checklist.md"
# coding_guidelines = "docs/mobile-coding-guidelines.md"
# security_guidelines = "docs/mobile-security-guidelines.md"

[[prompts]]
description = "KMP Code Review"
prompt_file = "{scripts}/prompts/pr/kmp-review.md"
checklist   = "config/kits/mobile-superapp/codebase/checklist.md"
# kmp_conventions = "docs/kmp-conventions.md"

[[prompts]]
description = "Android Code Review"
prompt_file = "{scripts}/prompts/pr/android-review.md"
checklist   = "config/kits/mobile-superapp/codebase/checklist.md"
# compose_guidelines = "docs/compose-guidelines.md"

[[prompts]]
description = "iOS Code Review"
prompt_file = "{scripts}/prompts/pr/ios-review.md"
checklist   = "config/kits/mobile-superapp/codebase/checklist.md"
# swiftui_guidelines = "docs/swiftui-guidelines.md"

[[prompts]]
description = "PRD Review (Platform/MiniApp/Epic)"
prompt_file = "{scripts}/prompts/pr/prd-review.md"
checklist   = "{prd_checklist}"
template    = "{prd_template}"
# project_domain = ""

[[prompts]]
description = "Design Review (Platform/MiniApp/Epic)"
prompt_file = "{scripts}/prompts/pr/design-review.md"
checklist   = "{design_checklist}"
template    = "{design_template}"
# architecture = "docs/architecture/"

[[prompts]]
description = "Feature Review (FEATURE-MOBILE)"
prompt_file = "{scripts}/prompts/pr/feature-review.md"
checklist   = "{feature_checklist}"
template    = "{feature_template}"
